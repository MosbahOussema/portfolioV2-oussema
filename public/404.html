<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page not found | Oussama Mosbah</title>
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0A0A0B;
      color: #F5F5F7;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .container {
      max-width: 480px;
    }

    .code {
      font-size: 7rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #7F1DFF 0%, #D46F88 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      letter-spacing: -4px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #F5F5F7;
    }

    p {
      color: #9A9AA0;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 9999px;
      background: linear-gradient(135deg, #7F1DFF 0%, #D46F88 100%);
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    a:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(127, 29, 255, 0.12);
      filter: blur(80px);
      pointer-events: none;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      z-index: -1;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.<br/>Head back to my portfolio.</p>
    <a href="/">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12l9-9 9 9"/><path d="M9 21V12h6v9"/>
      </svg>
      Back to portfolio
    </a>
  </div>
</body>
</html>
